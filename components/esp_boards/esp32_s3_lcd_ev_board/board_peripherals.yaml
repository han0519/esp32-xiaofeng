# Peripherals Configuration for ESP32-S3-LCD-EV-Board
peripherals:
  # Shared control bus for the TCA9554 IO expander.
  # ESP32-S3-LCD-EV-Board v1.5 / N16R16V routes I2C to SDA=GPIO47, SCL=GPIO48.
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 1
      pins:
        sda: 47
        scl: 48

  # Shared I2S bus for ES8311 speaker output and ES7210 microphone input.
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s_audio_config
      port: 1
      sample_rate_hz: 22050
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 5
        bclk: 16
        ws: 7
        dout: 6
        din: 15

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s_audio_config

  # Boot button on the main board.
  - name: gpio_boot_button
    type: gpio
    version: default
    role: io
    config:
      pin: 0
      mode: GPIO_MODE_INPUT
      pull_up: true
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
