version: "1.0"
description: >-
  Switch ESP32-S3-LCD-EV-Board (main board v1.5 / N16R16V) from its default
  480x480 GC9503 + FT5x06 sub-board to the 800x480 ST7262 RGB + GT1151 LCD
  sub-board (silkscreen ESP32-S3-LCD-EV-Board-SUB3). The main board's audio
  codec, microphone ADC, TCA9554 IO expander and sdkconfig defaults are
  reused as-is; only display_lcd and lcd_touch are amended.

apply:
  - panel_800_480_lcd.yaml
  - setup_panel_800_480_lcd.c
