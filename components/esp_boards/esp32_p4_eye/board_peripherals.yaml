version: 1.0.0
# Peripherals Configuration for ESP32-P4-EYE
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 14
        scl: 13

  - name: i2s_audio_in
    type: i2s
    version: default
    role: master
    format: pdm-in
    config:
      port: 0
      sample_rate_hz: 16000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      dn_sample_mode: I2S_PDM_DSR_8S
      bclk_div: 8
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_PDM_SLOT_LEFT
      data_fmt: I2S_PDM_DATA_FMT_PCM
      hp_en: true
      hp_cut_off_freq_hz: 35.5
      amplify_num: 1
      pins:
        clk: 22
        din: 21
      invert_flags:
        clk_inv: false

  - name: gpio_sd_power
    type: gpio
    version: default
    role: io
    config:
      pin: 46
      mode: GPIO_MODE_OUTPUT
      pull_up: false
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 1

  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI2_HOST
        data0_io_num: 16
        sclk_io_num: 17
        max_transfer_sz: 115200

  - name: ledc_backlight
    type: ledc
    version: default
    config:
      gpio_num: 20
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 1
      timer_sel: 1
      duty: 0
      output_invert: true

  - name: gpio_button_1
    type: gpio
    version: default
    role: io
    config:
      pin: 3
      mode: GPIO_MODE_INPUT
      pull_up: true
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 1

  - name: gpio_button_2
    type: gpio
    version: default
    role: io
    config:
      pin: 4
      mode: GPIO_MODE_INPUT
      pull_up: true
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 1

  - name: gpio_button_3
    type: gpio
    version: default
    role: io
    config:
      pin: 5
      mode: GPIO_MODE_INPUT
      pull_up: true
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 1

  - name: gpio_flashlight
    type: gpio
    version: default
    role: io
    config:
      pin: 23
      mode: GPIO_MODE_OUTPUT
      pull_up: false
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 0

  - name: gpio_mic_power
    type: gpio
    version: default
    role: io
    config:
      pin: 12
      mode: GPIO_MODE_OUTPUT
      pull_up: false
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 1
