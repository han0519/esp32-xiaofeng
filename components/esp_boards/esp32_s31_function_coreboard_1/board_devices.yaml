# Devices Configuration for ESP32-S31-Function-Coreboard-1
#
# Source: schematic 02_ESP32-S31 (page 2/3) and 03_Ethernet (page 3/3)
# Reference: https://dl.espressif.com/schematics/esp32-s31-function-coreboard-1-schematics.pdf
#
# Audio path on this board uses ONE physical ES8311 chip (mono codec). To
# fit the dev_audio_codec model (one logical device per direction), it is
# split into audio_dac (DAC-only) and audio_adc (ADC-only) sharing the
# same I2C address (0x18 7-bit / 0x30 8-bit) and the same I2S port.
#
devices:
  # ---------- Audio: ES8311 DAC (loud-speaker out via NS4150B PA) ----------
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"     # Mono: left channel
      mclk_enabled: true        # ES8311 needs MCLK from ESP32
      aec: false
    peripherals:
      - name: gpio_pa_control   # NS4150B CTRL
        gain: 6                 # NS4150B gain in dB (per datasheet typical value)
        active_level: 1
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30           # ES8311 7-bit 0x18 << 1
        frequency: 400000

  # ---------- Audio: ES8311 ADC (single on-board electret microphone J6) ----------
  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"     # Mono: left channel (MIC1P/MIC1N)
      adc_channel_labels: ['FC']  # Front-Center mono microphone
      adc_init_gain: 0
      mclk_enabled: true
      aec: false
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x30
        frequency: 400000

  # ---------- On-board WS2812 RGB status LED ----------
  # Schematic: GPIO60 -> Q1 (LBSS138 NMOS gate) -> drain pulled to 5 V via R23,
  # drain drives WS2812 DIN. The NMOS inverts the level (and shifts 3.3 V -> 5 V),
  # so set invert_out: true to compensate.
  - name: led_strip
    chip: ws2812
    type: led_strip
    sub_type: rmt
    version: 1.0.0
    config:
      strip_gpio_num: 60
      max_leds: 1
      led_model: LED_MODEL_WS2812
      color_component_format: LED_STRIP_COLOR_COMPONENT_FMT_GRB
      invert_out: false       # NMOS inverts GPIO60 before reaching WS2812 DIN
      rmt:
        clk_src: RMT_CLK_SRC_DEFAULT
        resolution_hz: 10000000
        mem_block_symbols: 0
        with_dma: false
