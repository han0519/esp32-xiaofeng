# Amend fragment: ESP32-S3-LCD-EV-Board with the 800x480 LCD sub-board
# (ST7262 RGB panel + GT1151 capacitive touch; silkscreen SUB3).
#
# The base board ships with the default 480x480 sub-board (GC9503 + FT5x06).
# This fragment rewrites `display_lcd` and `lcd_touch` in place; all other
# devices on the main board (audio codec, mic ADC, TCA9554 expander, boot
# button) are reused.
#
# Pin mapping reuses the GPIO group shared between the 480x480 and 800x480
# sub-boards on ESP32-S3-LCD-EV-Board v1.5 + ESP32-S3-WROOM-1-N16R16V.
# ST7262 is a plain RGB panel, so sub_type switches from `rgb_3wire_spi`
# (GC9503 needs vendor init commands over the TCA9554) to `rgb` (no extra
# panel IO).
version: 1.0.0

devices:
  - name: display_lcd
    chip: generic_rgb
    sub_type: rgb
    dependencies:
      idf: ">=5.3"
    config:
      swap_xy: false
      mirror_y: false
      mirror_x: false
      invert_color: false
      need_reset: true
      bits_per_pixel: 16
      rgb_panel_config:
        clk_src: LCD_CLK_SRC_PLL160M
        data_width: 16
        in_color_format: LCD_COLOR_FMT_RGB565
        out_color_format: LCD_COLOR_FMT_RGB565
        num_fbs: 2
        bounce_buffer_size_px: 16000
        dma_burst_size: 64
        de_gpio_num: 17
        pclk_gpio_num: 9
        vsync_gpio_num: 3
        hsync_gpio_num: 46
        disp_gpio_num: -1
        # ESP32-S3-LCD-EV-Board v1.5 / N16R16V swaps LCD_DATA6/7 to GPIO8/18.
        data_gpio_nums: [10, 11, 12, 13, 14, 21, 8, 18, 45, 38, 39, 40, 41, 42, 2, 1]
        timings:
          # SUB_BOARD3_800_480_PANEL_35HZ_RGB_TIMING() from
          # bsp/esp32_s3_lcd_ev_board/include/bsp/esp32_s3_lcd_ev_board.h
          pclk_hz: 18000000
          h_res: 800
          v_res: 480
          hsync_pulse_width: 40
          hsync_back_porch: 40
          hsync_front_porch: 48
          vsync_pulse_width: 23
          vsync_back_porch: 32
          vsync_front_porch: 13
          flags:
            pclk_active_neg: true
        flags:
          fb_in_psram: true

  - name: lcd_touch
    chip: gt1151
    sub_type: i2c
    dependencies:
      espressif/esp_lcd_touch_gt1151: "^1"
    config:
      io_i2c_config:
        # GT1151 uses 16-bit register addressing (vs FT5x06's 8-bit cmd).
        lcd_cmd_bits: 16
        scl_speed_hz: 400000
      touch_config:
        x_max: 800
        y_max: 480
    peripherals:
      # GT1151 7-bit address 0x14 -> 8-bit write address 0x28.
      - name: i2c_master
        i2c_addr: [0x28]
