# Devices Configuration for ESP32-S3-LCD-EV-Board
devices:
  # TCA9554 IO expander used by the audio PA and GC9503 3-wire SPI command interface.
  - name: gpio_expander
    chip: tca9554
    type: gpio_expander
    version: default
    dependencies:
      espressif/esp_io_expander_tca9554: "^2"
    config:
      max_pins: 8
      output_io_mask: [0, 1, 2, 3]
      output_io_level_mask: [1, 1, 1, 1]
      input_io_mask: NULL
    peripherals:
      - name: i2c_master
        i2c_addr: [0x40]

  # ES8311 speaker codec.
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 400000

  # ES7210 microphone ADC.
  - name: audio_adc
    chip: es7210
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 4
      adc_channel_mask: "0111"
      adc_channel_labels: ['NA', 'RE', 'FR', 'FL']
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x82
        frequency: 400000

  # Sub-board 2: 480x480 GC9503 panel.
  # The panel uses RGB565 data lines for pixels and a 3-wire SPI-like command bus
  # through the TCA9554 expander for vendor initialization commands.
  - name: display_lcd
    chip: gc9503
    type: display_lcd
    depends_on: gpio_expander
    version: default
    sub_type: rgb_3wire_spi
    dependencies:
      idf: ">=5.3"
      espressif/esp_lcd_panel_io_additions: "^1"
      espressif/esp_lcd_gc9503: "^3"
    config:
      swap_xy: false
      mirror_y: false
      mirror_x: false
      invert_color: false
      need_reset: true
      bits_per_pixel: 16
      io_3wire_spi_config:
        io_expander_name: gpio_expander
        line_config:
          cs_io_type: IO_TYPE_EXPANDER
          cs_expander_pin: IO_EXPANDER_PIN_NUM_1
          scl_io_type: IO_TYPE_EXPANDER
          scl_expander_pin: IO_EXPANDER_PIN_NUM_2
          sda_io_type: IO_TYPE_EXPANDER
          sda_expander_pin: IO_EXPANDER_PIN_NUM_3
        expect_clk_speed: 500000
        spi_mode: 0
        lcd_cmd_bytes: 1
        lcd_param_bytes: 1
        flags:
          use_dc_bit: true
          dc_zero_on_data: false
          lsb_first: false
          cs_high_active: false
          del_keep_cs_inactive: true
      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        bits_per_pixel: 18
        vendor_config: auto
        auto_del_panel_io: true
      rgb_panel_config:
        clk_src: LCD_CLK_SRC_PLL160M
        data_width: 16
        in_color_format: LCD_COLOR_FMT_RGB565
        out_color_format: LCD_COLOR_FMT_RGB565
        num_fbs: 2
        bounce_buffer_size_px: 9600
        dma_burst_size: 64
        de_gpio_num: 17
        pclk_gpio_num: 9
        vsync_gpio_num: 3
        hsync_gpio_num: 46
        disp_gpio_num: -1
        # ESP32-S3-LCD-EV-Board v1.5 / N16R16V swaps LCD_DATA6/7 to GPIO8/18.
        data_gpio_nums: [10, 11, 12, 13, 14, 21, 8, 18, 45, 38, 39, 40, 41, 42, 2, 1]
        timings:
          pclk_hz: 16000000
          h_res: 480
          v_res: 480
          hsync_pulse_width: 10
          hsync_back_porch: 10
          hsync_front_porch: 20
          vsync_pulse_width: 10
          vsync_back_porch: 10
          vsync_front_porch: 10
          flags:
            pclk_active_neg: false
        flags:
          fb_in_psram: true

  # Sub-board 2: 480x480 FT5x06 touch panel.
  - name: lcd_touch
    chip: ft5x06
    type: lcd_touch
    sub_type: i2c
    version: default
    dependencies:
      espressif/esp_lcd_touch_ft5x06: "^1"
    config:
      io_i2c_config:
        control_phase_bytes: 1
        dc_bit_offset: 0
        lcd_cmd_bits: 8
        lcd_param_bits: 0
        scl_speed_hz: 100000
        flags:
          dc_low_on_data: false
          disable_control_phase: true
      touch_config:
        x_max: 480
        y_max: 480
        rst_gpio_num: -1
        int_gpio_num: -1
        levels:
          reset: 0
          interrupt: 0
        flags:
          swap_xy: false
          mirror_x: false
          mirror_y: false
    peripherals:
      - name: i2c_master
        i2c_addr: [0x70]

  - name: gpio_button
    type: button
    sub_type: gpio
    version: default
    config:
      active_level: 0
      enable_power_save: false
      disable_pull: false
      long_press_time: 2000
      short_press_time: 0
      events_cfg:
        press_down: false
        press_up: false
        single_click: true
        double_click: false
        multi_click: false
        click_counts: []
        long_press_start: false
        long_press_start_time: []
        long_press_hold: false
        long_press_up: false
        long_press_up_time: []
        press_repeat: false
        press_repeat_done: false
        press_end: false
    peripherals:
      - name: gpio_boot_button
