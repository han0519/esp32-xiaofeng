version: 1.0.0
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 48
        scl: 47

  # I2S Standard Configuration
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s0_config
      port: 0
      sample_rate_hz: 16000
      mclk_multiple: 256

      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16

      pins:
        mclk: 38
        bclk: 40
        ws: 42
        dout: 41
        din: 39

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s0_config

  # LCD SPI Configuration
  - name: spi_master
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI2_HOST
        mosi_io_num: 16
        miso_io_num: 18
        sclk_io_num: 17
        max_transfer_sz: 3600

  - name: gpio_lcd_rd
    type: gpio
    config:
      pin: 10
      mode: GPIO_MODE_OUTPUT
      default_level: 1

  - name: gpio_lcd_bl
    type: gpio
    config:
      pin: 21
      mode: GPIO_MODE_OUTPUT
      default_level: 1
