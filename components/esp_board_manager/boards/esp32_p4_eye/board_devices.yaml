version: 1.0.0
devices:
  - name: sdcard_power_ctrl
    type: power_ctrl
    sub_type: gpio
    version: default
    peripherals:
      - name: gpio_sd_power
        active_level: 0

  - name: mic_power_ctrl
    type: power_ctrl
    sub_type: gpio
    version: default
    peripherals:
      - name: gpio_mic_power
        active_level: 1

  - name: audio_adc
    chip: internal
    type: audio_codec
    power_ctrl_device: mic_power_ctrl
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    power_ctrl_device: sdcard_power_ctrl
    version: default
    config:
      mount_point: "/sdcard"
      vfs_config:
        format_if_mount_failed: false
        max_files: 5
        allocation_unit_size: 16384
      sub_config:
        slot: SDMMC_HOST_SLOT_0
        frequency: SDMMC_FREQ_HIGHSPEED
        bus_width: 4
        slot_flags: 0
        pins:
          clk: 43
          cmd: 44
          d0: 39
          d1: 40
          d2: 41
          d3: 42
          cd: -1
          wp: -1
        ldo_chan_id: 4

  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      invert_color: true
      x_max: 240
      y_max: 240
      io_spi_config:
        cs_gpio_num: 18
        dc_gpio_num: 19
        spi_mode: 3
        pclk_hz: 80000000
      lcd_panel_config:
        reset_gpio_num: 15
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        flags:
          reset_active_high: false
        vendor_config: NULL
    peripherals:
      - name: spi_display

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    config:
      default_percent: 100
    peripherals:
      - name: ledc_backlight

  - name: camera
    type: camera
    version: default
    sub_type: csi
    power_ctrl_device: mic_power_ctrl
    config:
      csi_config:
        reset_io: 26
        pwdn_io: -1
        dont_init_ldo: false
        xclk_config:
          xclk_pin: 11
          xclk_freq_hz: 24000000
    peripherals:
      - name: i2c_master
        frequency: 100000

  - name: button_1
    type: button
    sub_type: gpio
    version: default
    config:
      active_level: 0
      enable_power_save: false
      disable_pull: false
      long_press_time: 2000
      short_press_time: 100
    peripherals:
      - name: gpio_button_1

  - name: button_2
    type: button
    sub_type: gpio
    version: default
    config:
      active_level: 0
      enable_power_save: false
      disable_pull: false
      long_press_time: 2000
      short_press_time: 100
    peripherals:
      - name: gpio_button_2

  - name: button_3
    type: button
    sub_type: gpio
    version: default
    config:
      active_level: 0
      enable_power_save: false
      disable_pull: false
      long_press_time: 2000
      short_press_time: 100
    peripherals:
      - name: gpio_button_3

  - name: flashlight
    chip: gpio_led
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 0
    peripherals:
      - name: gpio_flashlight
