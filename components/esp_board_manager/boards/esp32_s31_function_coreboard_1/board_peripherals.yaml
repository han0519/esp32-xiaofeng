# Peripherals Configuration for ESP32-S31-Function-CoreBoard-1
#
# Source: schematic 02_ESP32-S31 (page 2/3) and 03_Ethernet (page 3/3)
# Reference: https://dl.espressif.com/schematics/esp32-s31-function-coreboard-1-schematics.pdf
#
# ES8311 codec is wired through:
#   ESP32-S31 <--I2C--> ES8311 (CCLK/CDATA)
#   ESP32-S31 <--I2S--> ES8311 (MCLK/SCLK/LRCK/ASDOUT/DSDIN)
#   ESP32-S31 <--GPIO-> NS4150B PA (PA_CTRL, active-high)
#
# Schematic-confirmed nets:
#   IO53 -> I2S_SCLK
#   IO54 -> I2S_ASDOUT  (codec ADC output -> ESP32 I2S DIN)
#   IO55 -> I2S_LRCK    (I2S WS / FS)
#   IO56 -> I2S_DSDIN   (ESP32 I2S DOUT -> codec DAC input)
#   IO57 -> PA_CTRL
#   IO60 -> GPIO60 (drives WS2812 via NMOS Q1, see board_devices.yaml)
#   IO61 -> BOOT button
#
# Tentative (please verify against schematic page 2 ESP32-S31 module pinout):
#   IO50 -> I2S_MCLK     [TO_BE_CONFIRMED]
#   IO51 -> ESP_I2C_SDA  [TO_BE_CONFIRMED]
#   IO52 -> ESP_I2C_SCL  [TO_BE_CONFIRMED]
#
peripherals:
  # ES8311 control bus. Schematic nets: ESP_I2C_SDA, ESP_I2C_SCL.
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 51   # [TO_BE_CONFIRMED] ESP_I2C_SDA
        scl: 50   # [TO_BE_CONFIRMED] ESP_I2C_SCL

  # ES8311 audio I2S (full-duplex on a single I2S port).
  # Schematic nets: I2S_MCLK, I2S_SCLK (BCLK), I2S_LRCK (WS),
  #                 I2S_DSDIN (codec DAC input  = ESP32 DOUT),
  #                 I2S_ASDOUT (codec ADC output = ESP32 DIN).
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s_audio_config
      port: 0
      sample_rate_hz: 48000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 52    # [TO_BE_CONFIRMED] I2S_MCLK
        bclk: 53    # I2S_SCLK
        ws:   55    # I2S_LRCK
        dout: 56    # I2S_DSDIN  (ESP32 -> codec)
        din:  54    # I2S_ASDOUT (codec -> ESP32)

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s_audio_config

  # NS4150B PA enable. Schematic net: PA_CTRL (active-high).
  - name: gpio_pa_control
    type: gpio
    role: io
    config:
      pin: 57
      mode: GPIO_MODE_OUTPUT
      default_level: 0      # mute by default; raised by codec PA path

  # On-board WS2812 status LED. Schematic net: RGB_CTRL on GPIO60,
  # driven through Q1 (LBSS138 NMOS) so the signal is INVERTED at the
  # WS2812 DIN pad and shifted to 5 V via R23 pull-up. Use invert_out
  # in the led_strip device to compensate.
  # Note: the WS2812 IO is owned by the led_strip device, not declared here.

  # ----------------------------------------------------------------------
  # Not modeled (left to user / not needed for ES8311 audio bring-up):
  # - Ethernet (YT8531DC-CA + RGMII): bmgr currently has no eth device template
  # - USB Host (USB2.0 Type-A on USB1P1_DP/DN), USB Serial/JTAG, USB-UART
  # - SDIO header pins on J1 (SD_D0..3, SD_CLK, SD_CMD) - no SD socket on board
  # - BOOT button on GPIO61 (handled by ROM bootloader; add as button device if needed)
  # ----------------------------------------------------------------------
