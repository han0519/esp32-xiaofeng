version: 1.0.0
peripherals:
  - name: gpio_pack_extra
    type: gpio
    version: default
    role: io
    config:
      pin: 7
      mode: GPIO_MODE_OUTPUT
      pull_up: false
      pull_down: false
      intr_type: GPIO_INTR_DISABLE
      default_level: 0

devices:
  - name: pack_extra_power
    type: power_ctrl
    sub_type: gpio
    version: default
    peripherals:
      - name: gpio_pack_extra
        active_level: 1
